# .orkai.yaml — project configuration for Orkai
# See: orkai index --help
project:
    name: ecommerce_infra
    category_id: d7ebfb7353cfed030a8a321660071914
index:
    type: all
    path: .
    code:
        skip_tests: true
    documents:
        extensions:
            - .md
            - .pdf
            - .docx
    analytics:
        enabled: true
        paths:
            - .
        extensions:
            - .csv
            - .xlsx
            - .parquet
        validation:
            require_header: true
            min_rows: 1
            max_columns: 0
        fallback: skip
